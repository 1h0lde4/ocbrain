name: OCBrain Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:  # manual trigger for heavy build

jobs:

  # ─────────────────────────────────────────────
  # 1. CI JOB (FAST)
  # ─────────────────────────────────────────────
  ci:
    name: CI (Core Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements-ci.txt') }}

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run core tests
        run: |
          pytest core/ -v || pytest -v

  # ─────────────────────────────────────────────
  # 2. AI BUILD JOB (HEAVY)
  # ─────────────────────────────────────────────
  ai-build:
    name: AI Build & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    needs: ci

    # Only run on:
    # - manual trigger
    # - OR explicit commit message flag
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ai-build]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip (AI)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ai-${{ hashFiles('requirements-runtime.txt') }}

      # ⚠️ Install heavy dependencies
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-runtime.txt

      # Install torch CPU (safe for GitHub runner)
      - name: Install PyTorch (CPU)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      # Optional: setup script (your system logic)
      - name: Run setup script
        run: |
          chmod +x setup.sh
          ./setup.sh || echo "setup.sh skipped or partial"

      # Smoke test (no heavy execution)
      - name: AI import validation
        run: |
          python - <<EOF
          import sys
          print("Python:", sys.version)

          # Test critical imports
          import transformers
          import chromadb
          import spacy

          print("AI stack imported successfully")
          EOF

      # Optional: minimal runtime test
      - name: AI smoke test
        run: |
          python - <<EOF
          print("Running minimal AI validation...")
          # Add lightweight checks here
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocbrain-build
          path: .
